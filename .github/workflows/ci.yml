name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build and test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Dispatch.slnx

      - name: Build
        run: dotnet build Dispatch.slnx --configuration Release --no-restore

      # Headless Avalonia needs a real font manager, which is why the UI tests
      # run on Windows rather than a cheaper Linux runner.
      - name: Test
        run: >
          dotnet test Dispatch.slnx
          --configuration Release
          --no-build
          --logger "trx;LogFileName=results.trx"
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/**"

  portability:
    name: Core builds without Windows
    runs-on: ubuntu-latest

    # Dispatch.Core must never acquire a UI or Windows-only dependency. This
    # job is the thing that actually enforces it: a stray using directive would
    # pass on a Windows machine and fail here.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build Core
        run: dotnet build src/Dispatch.Core/Dispatch.Core.csproj --configuration Release

      - name: Test Core
        run: dotnet test tests/Dispatch.Core.Tests/Dispatch.Core.Tests.csproj --configuration Release

  package:
    name: Package
    runs-on: windows-latest
    needs: [build, portability]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish
        run: >
          dotnet publish src/Dispatch.App/Dispatch.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish

      - name: Package
        run: Compress-Archive -Path publish/* -DestinationPath Dispatch-${{ github.ref_name }}-win-x64.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dispatch-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
